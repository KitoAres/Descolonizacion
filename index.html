<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Descolonizando la Red - Mural Interactivo</title>

<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
    font-family: 'Segoe UI', sans-serif;
    /* Usamos tu mural como imagen de fondo */
    background: linear-gradient(rgba(10, 10, 15, 0.7), rgba(0, 0, 5, 0.9)), 
                url('image_3.png') no-repeat center center fixed;
    background-size: cover;
    color: white;
    overflow: hidden;
}

h1 {
    position: absolute;
    top: 20px;
    width: 100%;
    text-align: center;
    font-size: 26px;
    letter-spacing: 2px;
    text-shadow: 0 0 10px cyan;
    z-index: 10;
}

.subtitle {
    position: absolute;
    top: 60px;
    width: 100%;
    text-align: center;
    font-size: 14px;
    color: #ccc;
    z-index: 10;
}

/* Contenedor principal para la imagen y los puntos interactivos */
#mural-container {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: 1;
}

/* Estilo para los nodos interactivos */
.node {
    position: absolute;
    width: 28px;
    height: 28px;
    background: #00ffff;
    border-radius: 50%;
    cursor: pointer;
    box-shadow: 0 0 20px cyan;
    transition: 0.3s;
    border: 2px solid rgba(255,255,255,0.5);
    z-index: 5;
}

.node:hover {
    transform: scale(1.3);
    box-shadow: 0 0 30px cyan;
    background: white;
}

/* Estilo para la ventana modal */
.modal {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0.8);
    background: rgba(15, 15, 20, 0.95);
    padding: 25px;
    border-radius: 12px;
    width: 340px;
    box-shadow: 0 0 30px cyan;
    display: none;
    transition: 0.3s ease;
    z-index: 20;
    border: 1px solid rgba(0, 255, 255, 0.2);
    text-align: center; /* Alineamos al centro para que el QR se vea simétrico */
}

.modal.active {
    display: block;
    transform: translate(-50%, -50%) scale(1);
}

.modal h2 {
    margin-bottom: 10px;
    color: cyan;
    text-shadow: 0 0 5px cyan;
}

/* Estilos nuevos para la imagen del QR y los textos */
.modal img {
    max-width: 100%;
    border-radius: 8px;
    margin-bottom: 15px;
    box-shadow: 0 0 10px rgba(0, 255, 255, 0.3);
}

.modal p {
    margin-bottom: 15px;
    line-height: 1.5;
}

.modal button {
    margin-top: 5px;
    padding: 10px 15px;
    border: none;
    border-radius: 6px;
    background: cyan;
    color: black;
    cursor: pointer;
    font-weight: bold;
    transition: 0.2s;
    width: 100%; /* Botones a todo lo ancho */
}

.modal button:hover {
    background: white;
    box-shadow: 0 0 10px white;
}

/* Estilo especial para el botón que viaja a la Chakana */
.btn-red {
    background: #ff00ff !important;
    color: white !important;
    margin-bottom: 10px;
    text-shadow: 0 0 5px rgba(255,255,255,0.5);
    box-shadow: 0 0 15px rgba(255,0,255,0.4);
}

.btn-red:hover {
    background: white !important;
    color: #ff00ff !important;
    box-shadow: 0 0 20px #ff00ff !important;
}

</style>
</head>

<body>

<h1>MURAL INTERACTIVO - DESCOLONIZANDO LA RED</h1>
<div class="subtitle">Haz clic en los nodos para descubrir más. Conecta con la cultura.</div>

<div id="mural-container">
</div>

<div class="modal" id="modal">
    <h2 id="modalTitle"></h2>
    
    <img id="modalImage" src="" alt="Contenido del nodo" style="display: none;">
    <p id="modalText"></p>
    
    <button id="modalLinkBtn" class="btn-red" style="display: none;" onclick="goToLink()">¡Explorar la Red Cósmica!</button>
    <button onclick="closeModal()">Cerrar</button>
</div>

<audio id="audio-player"></audio>

<script>
const container = document.getElementById("mural-container");
const player = document.getElementById("audio-player");
let currentLink = ""; // Variable para guardar la URL a donde viajaremos

// Definición de los nodos interactivos. Aquí le añadí la imagen y el link solo a la Chakana.
const nodes = [
    { top: 10, left: 10, title: "EL MENSAJE", text: "¡Bienvenido! Este es el punto de partida. Una invitación a desconectar de los prejuicios y conectar con el mundo que nos rodea." },
    { top: 40, left: 80, title: "LA VOZ", text: "El espíritu y la fuerza de la mujer andina, un puente entre el pasado y el presente." },
    { top: 80, left: 20, title: "LA DANZA", text: "La Diablada, la danza que une cielo y tierra, bien y mal, en un carnaval de vida." },
    { top: 50, left: 50, title: "LA RED CÓSMICA", text: "La Cruz Andina, un mapa para conectar con los tres mundos. Escanea el código o entra a la red.", image: "Image_4.jpeg", link: "chakana.html" },
    { top: 30, left: 15, title: "LA ENERGÍA", text: "Las fuerzas que fluyen y nos unen. Tu mundo te espera." },
    { top: 85, left: 65, title: "LA LLAMA", text: "La llama, compañera vital en los Andes. Escucha su llamado." }
];

// Crear nodos interactivos dinámicamente y añadirlos al contenedor
nodes.forEach((node, index) => {
    const nodeEl = document.createElement("div");
    nodeEl.className = "node";
    nodeEl.style.top = `${node.top}%`;
    nodeEl.style.left = `${node.left}%`;
    
    // Ahora pasamos la imagen y el link si existen, o indefinido si no.
    nodeEl.onclick = () => openModal(node.title, node.text, node.image, node.link);
    container.appendChild(nodeEl);
});

// Función modificada para abrir la ventana modal
function openModal(title, text, image, link) {
    document.getElementById("modalTitle").innerText = title;
    document.getElementById("modalText").innerText = text;

    // ¿Tiene imagen (QR)? La mostramos, si no, la ocultamos.
    const imgEl = document.getElementById("modalImage");
    if (image) {
        imgEl.src = image;
        imgEl.style.display = "block";
    } else {
        imgEl.style.display = "none";
    }

    // ¿Tiene enlace? Lo mostramos, si no, lo ocultamos.
    const linkBtn = document.getElementById("modalLinkBtn");
    if (link) {
        currentLink = link;
        linkBtn.style.display = "block";
    } else {
        linkBtn.style.display = "none";
    }

    document.getElementById("modal").classList.add("active");

    // Detener y reiniciar cualquier audio previo
    player.pause();
    player.currentTime = 0;
}

// Función para teletransportar al usuario a la red de la Chakana
function goToLink() {
    if (currentLink) {
        window.location.href = currentLink;
    }
}

// Función para cerrar la ventana modal
function closeModal() {
    document.getElementById("modal").classList.remove("active");
    player.pause(); // Detener la música al cerrar
}
</script>

</body>
</html>
